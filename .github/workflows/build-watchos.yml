name: Build watchOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build watchOS App (Simulator)
        run: |
          xcodebuild \
            -project "HealthBotWatch.xcodeproj" \
            -scheme "HealthBotWatch WatchKit App" \
            -sdk watchsimulator \
            -destination "platform=watchOS Simulator,name=Apple Watch Series 9 (45mm)" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            clean build \
            | xcpretty || xcodebuild \
            -project "HealthBotWatch.xcodeproj" \
            -scheme "HealthBotWatch WatchKit App" \
            -sdk watchsimulator \
            -destination "platform=watchOS Simulator,name=Apple Watch Series 9 (45mm)" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Build watchOS App (Device — no signing)
        run: |
          xcodebuild \
            -project "HealthBotWatch.xcodeproj" \
            -scheme "HealthBotWatch WatchKit App" \
            -sdk watchos \
            -destination "generic/platform=watchOS" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build \
            2>&1 | tail -50

      - name: Archive for device (with signing skip)
        run: |
          xcodebuild archive \
            -project "HealthBotWatch.xcodeproj" \
            -scheme "HealthBotWatch WatchKit App" \
            -sdk watchos \
            -destination "generic/platform=watchOS" \
            -archivePath "${{ github.workspace }}/HealthBotWatch.xcarchive" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tail -50

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HealthBotWatch-${{ github.sha }}
          path: ${{ github.workspace }}/HealthBotWatch.xcarchive
          retention-days: 7
