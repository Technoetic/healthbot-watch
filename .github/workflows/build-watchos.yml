name: Build watchOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -project "HealthBotWatch.xcodeproj" -list

      - name: Build iOS + Watch (Simulator)
        run: |
          xcodebuild \
            -project "HealthBotWatch.xcodeproj" \
            -scheme "HealthBotWatch" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Download watchOS platform
        run: xcodebuild -downloadPlatform watchOS 2>&1 | tail -5 || true

      - name: Archive iOS + Watch (Device)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "HealthBotWatch.xcodeproj" \
            -scheme "HealthBotWatch" \
            -destination "generic/platform=iOS" \
            -archivePath "${{ github.workspace }}/HealthBotWatch.xcarchive" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            | xcpretty || xcodebuild archive \
            -project "HealthBotWatch.xcodeproj" \
            -scheme "HealthBotWatch" \
            -destination "generic/platform=iOS" \
            -archivePath "${{ github.workspace }}/HealthBotWatch.xcarchive" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
          ls -la "${{ github.workspace }}/HealthBotWatch.xcarchive" && echo "Archive OK"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HealthBotWatch-${{ github.sha }}
          path: ${{ github.workspace }}/HealthBotWatch.xcarchive
          if-no-files-found: warn
          retention-days: 7
